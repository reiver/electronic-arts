			<p>
				easter-egg in www.electronicarts.com web-site
			</p>
		</hgroup>
		<p>
			by <a href="https://reiver.link/">Charles Iliya Krempeaux</a> at <time datetime="2014-08-20T04:07:18.000Z">August 19th, 2014</time>
		</p>
	</header>
	<figure>
		<img src="default.png" />
		<figcaption>
			The www.electronicarts.com web-site has an easter-egg in the HTTP response
			—
			a special HTTP response header:
			<code>X-allyourbase: are_belong_to_us</code>.
			Which is a reference to the “All your base are belong to us” Internet meme.
			Which is itself a reference to a poorly translated phrase  from the opening cutscene of the Japanese video game <strong>Zero Wing</strong>.
		</figcaption>
	</figure>
